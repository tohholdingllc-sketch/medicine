<!doctype html>
<html lang="it" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='8'%20fill='%2315803d'/%3E%3Crect%20x='13.5'%20y='7'%20width='5'%20height='18'%20rx='2.5'%20fill='%23ffffff'/%3E%3Crect%20x='7'%20y='13.5'%20width='18'%20height='5'%20rx='2.5'%20fill='%23ffffff'/%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f6f4" />
    <meta
      name="description"
      content="Flashcard di batteriologia: nome del batterio sul fronte, tutte le informazioni sul retro. Ripasso a ripetizione dilazionata."
    />
    <title>Batteriologia · Flashcards</title>

    <!-- Pre-imposta il tema prima del paint per evitare il flash -->
    <script>
      try {
        var t = localStorage.getItem('flashcards-batteriologia:theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
